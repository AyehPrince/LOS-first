{% extends "base.html" %}
{% block content %}
<div class="text-center mt-5">
    <h2>Welcome to LunchOrder 🍱</h2>
    <p class="text-muted mt-2">Corporate lunch ordering made simple.</p>
    <div class="mt-4">
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('orders.browse') }}" class="btn btn-dark me-2">Browse Vendors</a>
            <a href="{{ url_for('orders.my_orders') }}" class="btn btn-outline-dark">My Orders</a>
            {% if current_user.is_admin %}
            <a href="{{ url_for('vendor.vendor_list') }}" class="btn btn-outline-secondary ms-2">Manage Vendors</a>
            {% endif %}
        {% else %}
            <a href="{{ url_for('auth.login') }}" class="btn btn-dark me-2">Login</a>
            <a href="{{ url_for('auth.register') }}" class="btn btn-outline-dark">Register</a>
        {% endif %}
    </div>
</div>
{% endblock %}
